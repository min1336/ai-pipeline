name: PR Review

on:
  workflow_call:
    inputs:
      max-turns:
        type: number
        default: 20
    secrets:
      CLAUDE_OAUTH_TOKEN:
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: min1336/ai-pipeline/actions/load-skills@main
      - uses: min1336/ai-pipeline/actions/parse-pipeline@main

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
          track_progress: true
          classify_inline_comments: 'true'
          prompt: |
            /review-pr ${{ github.event.pull_request.number || github.event.issue.number }}
          claude_args: |
            --max-turns ${{ inputs.max-turns }}
            --allowedTools "Read,Glob,Grep,Bash(gh pr:*),Bash(gh issue:*),mcp__github_inline_comment__create_inline_comment"
