name: PR Review

on:
  workflow_call:
    inputs:
      max-turns:
        type: number
        default: 20
    secrets:
      CLAUDE_OAUTH_TOKEN:
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: min1336/ai-pipeline/actions/load-skills@main

      - id: config
        uses: min1336/ai-pipeline/actions/parse-pipeline@main

      - id: ctx
        uses: min1336/ai-pipeline/actions/gather-context@main
        with:
          scope: pr
          number: ${{ github.event.pull_request.number || github.event.issue.number }}

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
          track_progress: true
          classify_inline_comments: 'true'
          direct_prompt: |
            ## 프로젝트 설정
            - 언어: ${{ steps.config.outputs.language }}
            - 리뷰 역할: ${{ steps.config.outputs.review-roles }}
            - 리뷰 통과 점수: ${{ steps.config.outputs.review-threshold }}/100

            ## 프로젝트 컨텍스트
            ${{ steps.ctx.outputs.domain-context }}
            ${{ steps.ctx.outputs.project-context }}
            ---
            /review-pr ${{ github.event.pull_request.number || github.event.issue.number }}
          claude_args: |
            --max-turns ${{ inputs.max-turns }}
            --allowedTools "Read,Glob,Grep,Bash(gh pr:*),Bash(gh issue:*),mcp__github_inline_comment__create_inline_comment"
