name: Fix PR Review Feedback

on:
  workflow_call:
    inputs:
      max-turns:
        type: number
        default: 20
      pr-number:
        type: number
        required: true
        description: 수정할 PR 번호
    secrets:
      CLAUDE_OAUTH_TOKEN:
        required: true

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: min1336/ai-pipeline/actions/load-skills@main

      - id: config
        uses: min1336/ai-pipeline/actions/parse-pipeline@main

      - id: ctx
        uses: min1336/ai-pipeline/actions/gather-context@main
        with:
          scope: pr
          number: ${{ inputs.pr-number }}

      - name: 언어별 도구 결정
        id: tools
        shell: bash
        run: |
          LANG="${{ steps.config.outputs.language }}"
          BASE="Read,Glob,Grep,Edit,Write,Bash(git:*),Bash(gh pr:*)"
          case "$LANG" in
            python)  echo "allowed=${BASE},Bash(pip:*),Bash(python:*)" >> "$GITHUB_OUTPUT" ;;
            go)      echo "allowed=${BASE},Bash(go:*)" >> "$GITHUB_OUTPUT" ;;
            *)       echo "allowed=${BASE},Bash(npm:*)" >> "$GITHUB_OUTPUT" ;;
          esac

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            ## 프로젝트 설정
            - 언어: ${{ steps.config.outputs.language }}
            - 테스트: `${{ steps.config.outputs.test-command }}`
            - 린트: `${{ steps.config.outputs.lint-command }}`

            ## 프로젝트 컨텍스트
            ${{ steps.ctx.outputs.domain-context }}
            ---
            /fix-pr ${{ inputs.pr-number }}
          claude_args: |
            --max-turns ${{ inputs.max-turns }}
            --allowedTools "${{ steps.tools.outputs.allowed }}"
