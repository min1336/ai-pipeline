name: Weekly Maintenance

on:
  workflow_call:
    inputs:
      max-turns:
        type: number
        default: 15
    secrets:
      CLAUDE_OAUTH_TOKEN:
        required: true

jobs:
  maintenance:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: min1336/ai-pipeline/actions/load-skills@main

      - id: config
        uses: min1336/ai-pipeline/actions/parse-pipeline@main

      - id: ctx
        uses: min1336/ai-pipeline/actions/gather-context@main
        with:
          scope: maintenance

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            ## 프로젝트 설정
            - 이름: ${{ steps.config.outputs.project-name }}
            - 언어: ${{ steps.config.outputs.language }}

            ## 현재 상태
            ${{ steps.ctx.outputs.project-context }}
            ---
            /maintenance
          claude_args: |
            --max-turns ${{ inputs.max-turns }}
            --allowedTools "Read,Glob,Grep,Bash(gh issue:*),Bash(gh search:*),Bash(gh pr:*),Bash(git log:*),Bash(npm audit:*),Bash(pip audit:*),Bash(./scripts/edit-issue-labels.sh:*)"
