name: Issue Decompose

on:
  workflow_call:
    inputs:
      max-turns:
        type: number
        default: 20
    secrets:
      CLAUDE_OAUTH_TOKEN:
        required: true

jobs:
  decompose:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: min1336/ai-pipeline/actions/load-skills@main

      - id: config
        uses: min1336/ai-pipeline/actions/parse-pipeline@main

      - id: ctx
        uses: min1336/ai-pipeline/actions/gather-context@main
        with:
          scope: issue
          number: ${{ github.event.issue.number }}

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            ## 프로젝트 설정
            - 이름: ${{ steps.config.outputs.project-name }}
            - 언어: ${{ steps.config.outputs.language }}
            - 테스트: `${{ steps.config.outputs.test-command }}`
            - 린트: `${{ steps.config.outputs.lint-command }}`
            - 리뷰 역할: ${{ steps.config.outputs.review-roles }}

            ## 프로젝트 컨텍스트
            ${{ steps.ctx.outputs.domain-context }}
            ${{ steps.ctx.outputs.project-context }}
            ---
            /decompose-issue ${{ github.event.issue.number }}
          claude_args: |
            --max-turns ${{ inputs.max-turns }}
            --allowedTools "Read,Glob,Grep,Bash(gh issue:*),Bash(gh search:*),Bash(./scripts/edit-issue-labels.sh:*)"
