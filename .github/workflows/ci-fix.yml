name: CI Auto Fix

on:
  workflow_call:
    inputs:
      max-turns:
        type: number
        default: 15
      run-id:
        type: string
        required: true
        description: 실패한 워크플로우 run ID
    secrets:
      CLAUDE_OAUTH_TOKEN:
        required: true

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: min1336/ai-pipeline/actions/load-skills@main
      - uses: min1336/ai-pipeline/actions/parse-pipeline@main

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            /fix-ci ${{ inputs.run-id }}
          claude_args: |
            --max-turns ${{ inputs.max-turns }}
            --allowedTools "Read,Glob,Grep,Edit,Write,Bash(npm:*),Bash(npx:*),Bash(pip:*),Bash(git:*),Bash(gh pr:*),mcp__github_ci__get_ci_status,mcp__github_ci__get_workflow_run_details,mcp__github_ci__download_job_log"
